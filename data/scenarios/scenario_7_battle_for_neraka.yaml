# Scenario 7: Battle for Neraka
scenario:
  id: "scenario_7_battle_for_neraka"
  picture: "scenario_7.jpg"
  description: >
    The War of the Lance surged like a bloody tide back and forth across the plains of Solamnia for two years. 
    First came the flood of dragon armies, treading the plains under their clawed feet and destroying all life in their path. 
    Then came the terrible sieges of Thelgaard Keep and Solanthus, as the hard-pressed Knights of Solamnia fought for 
    what little foothold they had on their native soil. That winter was the darkest known for many years.
    
    With the spring came the Golden General, and the bright armies of the Knighthood rose up again as though by miracle. 
    They seemed, to many, to have come from nowhere at all. In truth, they had been in seclusion awaiting their time again 
    and it had come. With the tremendous aid of the dragons of good, just newly returned among men, the Whitestone forces 
    pressed back the dragon tide and regained the plains even so far as the Estwilde and pressed the very foothills of 
    Neraka itself. The evil had been beaten back into its lair.
    
    Yet the evil was far from dead. With new and terrible weapons did the Dragon Highlords strike back. 
    Their flying citadels rained terror down from above with their combination of lightning attacks and tremendous defense. 
    It looked as though the Dragonarmies were about to break through the Whitestone defense lines and destroy the 
    overextended Knights.

    It was now or never for the Knights. To delay would mean a prolonged campaign. If only the Knights could deal a 
    crushing blow aimed right at the heart of the Dragon Empire. If only their strength would hold long enough to reach 
    and conquer Neraka itself! If not... 

  # Map Configuration
  # If null or omitted, assume full map [0,0] to [64,52]
  #map_subset:
  #  x_range: [35, 52]
  #  y_range: [32, 47]

  # Timeline and Turn Logic
  start_turn: 25
  end_turn: 30
  #initiative_start: "highlord"  # highlord | whitestone | neutral

  # Global Events
  possible_events: all

  # Allegiance-based Setup
  initial_setup:
    # Countries that are on the map but not yet controlled by either main player
    neutral:
      countries: null

    highlord:
      # Deployment area: If null, defaults to the union of all country territories below
      deployment_area: null

      countries:
        taman: all
        red:
          # Explicit partial setup
          units_by_type:
            dragon: 1

      # Specific units (Leaders/Wizards) not tied to a country's regular army
      explicit_units: ["verminaard", "kitiara", "iolanthe"]
      units_by_type:
        citadel: 2
      assets:
        dragon_orb: 1

      victory_conditions:
        major:
          type: prevent_location_captured
          location: neraka

    whitestone:
      # Example of specific deployment region (subset of countries)
      deployment_area:
        countries: ["estwilde"]

      countries:
        qualinesti: all # Automatically pulls 4 inf, 4 wing (griffon), etc.
        sancrist: all
        southlund: all
        gold: all
        silver: all
        bronze: all
        copper: all
        brass: all

      explicit_units: ["fizban", "laurana"]
      assets:
        dragonlance: 2

      victory_conditions:
        major:
          type: capture_location
          location: neraka
          by_turn: 30

  notes: >
    Any additional special rules or setup instructions.
