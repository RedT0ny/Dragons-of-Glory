name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    env:
      PYTHON_VERSION: "3.11"
      QT_PYSIDE_VERSION: "6.10.2"
      TARGET_ARCH: "aarch64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify deploy spec exists
        run: |
          test -f pysidedeploy.spec || { echo "Missing pysidedeploy.spec at repository root"; exit 1; }

      - name: Define dynamic paths
        run: |
          echo "VENV_PATH=$RUNNER_TEMP/android-venv" >> "$GITHUB_ENV"
          echo "WHEEL_DIR=$GITHUB_WORKSPACE/android-wheels" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            wget \
            patchelf \
            python3-pip \
            python3-setuptools \
            python3-dev \
            build-essential \
            patch \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            autopoint \
            gettext \
            gawk

      - name: Create virtual environment
        run: |
          python -m venv "$VENV_PATH"
          source "$VENV_PATH/bin/activate"
          python -m pip install --upgrade pip
          pip install -r requirements-android.txt
          pip install buildozer==1.5.0 Cython==0.29.34 setuptools GitPython tqdm Jinja2

      - name: Download Android prerequisites using Qt helper
        run: |
          set -Eeuo pipefail
          source "$VENV_PATH/bin/activate"

          rm -rf pyside-setup
          git clone --depth 1 https://github.com/pyside/pyside-setup.git pyside-setup
          cd pyside-setup

          python tools/cross_compile_android/main.py \
            --download-only \
            --skip-update \
            --auto-accept-license

          if [ -d "$HOME/.pyside6_android_deploy" ]; then
            echo "QT_DEPLOY_CACHE=$HOME/.pyside6_android_deploy" >> "$GITHUB_ENV"
          elif [ -d "$HOME/.pyside6-android-deploy" ]; then
            echo "QT_DEPLOY_CACHE=$HOME/.pyside6-android-deploy" >> "$GITHUB_ENV"
          else
            echo "Qt helper did not create a detectable cache directory"
            ls -la "$HOME"
            exit 1
          fi

      - name: Confirm Qt helper cache exists
        run: |
          test -n "$QT_DEPLOY_CACHE" || { echo "QT_DEPLOY_CACHE is empty"; exit 1; }
          test -d "$QT_DEPLOY_CACHE" || { echo "Qt helper cache directory does not exist"; exit 1; }
          find "$QT_DEPLOY_CACHE" -maxdepth 3 -type d | sort | sed -n '1,120p'

      - name: Download Android wheels
        run: |
          set -euo pipefail
          mkdir -p "$WHEEL_DIR"

          PYSIDE_WHEEL="PySide6-${QT_PYSIDE_VERSION}-${QT_PYSIDE_VERSION}-cp311-cp311-android_${TARGET_ARCH}.whl"
          SHIBOKEN_WHEEL="shiboken6-${QT_PYSIDE_VERSION}-${QT_PYSIDE_VERSION}-cp311-cp311-android_${TARGET_ARCH}.whl"

          wget -q -O "$WHEEL_DIR/$PYSIDE_WHEEL" \
            "https://download.qt.io/snapshots/ci/pyside/${QT_PYSIDE_VERSION}/latest/pyside6/${PYSIDE_WHEEL}"

          wget -q -O "$WHEEL_DIR/$SHIBOKEN_WHEEL" \
            "https://download.qt.io/snapshots/ci/pyside/${QT_PYSIDE_VERSION}/latest/pyside6/${SHIBOKEN_WHEEL}"

      - name: Prepare main.py for Android deploy
        run: |
          test -f src/main.py || { echo "Missing src/main.py"; exit 1; }
          ln -sf src/main.py main.py

      - name: Remove UTF-8 BOM from Python files
        run: |
          python - <<'PY'
          from pathlib import Path

          fixed = []
          for p in Path("src").rglob("*.py"):
              raw = p.read_bytes()
              if raw.startswith(b'\xef\xbb\xbf'):
                  p.write_bytes(raw[3:])
                  fixed.append(str(p))

          if fixed:
              print("Removed BOM from:")
              for f in fixed:
                  print(" -", f)
          else:
              print("No BOM found in Python files under src.")
          PY

      - name: Patch pysidedeploy.spec for CI
        run: |
          python - <<'PY'
          import configparser
          from pathlib import Path
          import os

          spec_path = Path("pysidedeploy.spec")
          cfg = configparser.ConfigParser()
          cfg.optionxform = str
          cfg.read(spec_path, encoding="utf-8")

          for section in ("app", "python", "android", "buildozer"):
              if section not in cfg:
                  cfg[section] = {}

          qt_ver = os.environ["QT_PYSIDE_VERSION"]
          arch = os.environ["TARGET_ARCH"]
          wheel_dir = os.environ["WHEEL_DIR"]
          venv_path = os.environ["VENV_PATH"]

          cfg["app"]["project_file"] = "pyproject.toml"

          cfg["python"]["python_path"] = f"{venv_path}/bin/python"
          cfg["python"]["android_packages"] = "buildozer==1.5.0,Cython==0.29.34,setuptools"

          cfg["android"]["wheel_pyside"] = f"{wheel_dir}/PySide6-{qt_ver}-{qt_ver}-cp311-cp311-android_{arch}.whl"
          cfg["android"]["wheel_shiboken"] = f"{wheel_dir}/shiboken6-{qt_ver}-{qt_ver}-cp311-cp311-android_{arch}.whl"

          cfg["buildozer"]["mode"] = "debug"
          cfg["buildozer"]["arch"] = arch

          # Leave sdk_path / ndk_path empty so pyside6-android-deploy
          # can auto-detect them from the Qt helper cache.
          cfg["buildozer"]["sdk_path"] = ""
          cfg["buildozer"]["ndk_path"] = ""

          with spec_path.open("w", encoding="utf-8") as f:
              cfg.write(f)

          print("Patched pysidedeploy.spec")
          PY

      - name: Build APK end-to-end with pyside6-android-deploy
        run: |
          set -Eeuo pipefail
          rm -rf .buildozer buildozer.spec src/deployment bin build ci-debug
          mkdir -p ci-debug
          source "$VENV_PATH/bin/activate"

          echo "QT_DEPLOY_CACHE=$QT_DEPLOY_CACHE" | tee ci-debug/build-apk.log

          pyside6-android-deploy \
            --verbose \
            --config-file pysidedeploy.spec \
            --extra-ignore-dirs .git,.github,build,dist,venv,__pycache__,android-wheels \
            2>&1 | tee -a ci-debug/build-apk.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            ci-debug/**
            buildozer.spec
            src/deployment/**
          if-no-files-found: ignore

      - name: Upload Android package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dog-android-package
          path: |
            bin/*.apk
            bin/*.aab
            ./**/*.apk
            ./**/*.aab
          if-no-files-found: error