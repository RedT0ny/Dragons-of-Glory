name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    env:
      PYTHON_VERSION: "3.11"
      QT_PYSIDE_VERSION: "6.10.2"
      TARGET_ARCH: "aarch64"
      ANDROID_API_LEVEL: "34"
      ANDROID_BUILD_TOOLS: "35.0.0"
      ANDROID_NDK_VERSION: "26.1.10909125"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Define dynamic paths
        run: |
          echo "VENV_PATH=$RUNNER_TEMP/android-venv" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$RUNNER_TEMP/android-sdk" >> "$GITHUB_ENV"
          echo "WHEEL_DIR=$GITHUB_WORKSPACE/android-wheels" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            wget \
            patchelf \
            python3-pip \
            python3-setuptools \
            python3-dev \
            build-essential \
            patch \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            autopoint \
            gettext \
            gawk

      - name: Create virtual environment
        run: |
          python -m venv "$VENV_PATH"
          source "$VENV_PATH/bin/activate"
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 Cython==0.29.34 setuptools

      - name: Install Android SDK command-line tools
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

      - name: Create legacy sdkmanager path for Buildozer compatibility
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
                 "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          test -x "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"

      - name: Install Android SDK/NDK packages
        run: |
          export PATH="$JAVA_HOME/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;3.22.1"

      - name: Download Android wheels
        run: |
          set -euo pipefail
          mkdir -p "$WHEEL_DIR"

          PYSIDE_WHEEL="PySide6-${QT_PYSIDE_VERSION}-${QT_PYSIDE_VERSION}-cp311-cp311-android_${TARGET_ARCH}.whl"
          SHIBOKEN_WHEEL="shiboken6-${QT_PYSIDE_VERSION}-${QT_PYSIDE_VERSION}-cp311-cp311-android_${TARGET_ARCH}.whl"

          wget -q -O "$WHEEL_DIR/$PYSIDE_WHEEL" \
            "https://download.qt.io/snapshots/ci/pyside/${QT_PYSIDE_VERSION}/latest/pyside6/${PYSIDE_WHEEL}"

          wget -q -O "$WHEEL_DIR/$SHIBOKEN_WHEEL" \
            "https://download.qt.io/snapshots/ci/pyside/${QT_PYSIDE_VERSION}/latest/pyside6/${SHIBOKEN_WHEEL}"

      - name: Verify required deployment assets exist
        run: |
          test -f buildozer.spec || { echo "Missing buildozer.spec at repo root"; exit 1; }
          test -d src/deployment/recipes/PySide6 || { echo "Missing src/deployment/recipes/PySide6"; exit 1; }
          test -d src/deployment/recipes/shiboken6 || { echo "Missing src/deployment/recipes/shiboken6"; exit 1; }
          test -f src/deployment/jar/PySide6/jar/Qt6Android.jar || { echo "Missing Qt6Android.jar"; exit 1; }
          test -f src/deployment/jar/PySide6/jar/Qt6AndroidBindings.jar || { echo "Missing Qt6AndroidBindings.jar"; exit 1; }
          test -f src/main.py || { echo "Missing src/main.py"; exit 1; }

      - name: Prepare main.py for Buildozer
        run: |
          ln -sf src/main.py main.py

      - name: Remove UTF-8 BOM from Python files
        run: |
          python - <<'PY'
          from pathlib import Path

          fixed = []
          for p in Path("src").rglob("*.py"):
              raw = p.read_bytes()
              if raw.startswith(b'\xef\xbb\xbf'):
                  p.write_bytes(raw[3:])
                  fixed.append(str(p))

          if fixed:
              print("Removed BOM from:")
              for f in fixed:
                  print(" -", f)
          else:
              print("No BOM found in Python files under src.")
          PY

      - name: Build APK with Buildozer directly
        run: |
          set -Eeuo pipefail
          mkdir -p ci-debug
          source "$VENV_PATH/bin/activate"

          # Normalize Android environment for Buildozer / p4a
          unset ANDROID_NDK ANDROID_NDK_HOME ANDROID_NDK_ROOT ANDROID_NDK_LATEST_HOME
          unset ANDROIDSDK ANDROIDNDK ANDROIDAPI ANDROIDMINAPI

          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export ANDROID_SDK_ROOT="$ANDROID_SDK_ROOT"

          export ANDROIDNDK="$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION"
          export ANDROIDSDK="$ANDROID_SDK_ROOT"

          export ANDROID_NDK="$ANDROIDNDK"
          export ANDROID_NDK_HOME="$ANDROIDNDK"
          export ANDROID_NDK_ROOT="$ANDROIDNDK"

          export ANDROIDAPI=34
          export ANDROIDMINAPI=24

          export PATH="$JAVA_HOME/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" | tee ci-debug/build-apk.log
          echo "ANDROID_NDK=$ANDROIDNDK" | tee -a ci-debug/build-apk.log
          echo "ANDROIDAPI=$ANDROIDAPI" | tee -a ci-debug/build-apk.log
          echo "ANDROIDMINAPI=$ANDROIDMINAPI" | tee -a ci-debug/build-apk.log

          python -m buildozer -v android debug 2>&1 | tee -a ci-debug/build-apk.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            ci-debug/**
          if-no-files-found: ignore

      - name: Upload Android package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dog-android-package
          path: |
            bin/*.apk
            bin/*.aab
            ./**/*.apk
            ./**/*.aab
          if-no-files-found: error