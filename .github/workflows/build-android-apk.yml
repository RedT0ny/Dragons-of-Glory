name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    env:
      PYTHON_VERSION: "3.11"
      QT_PYSIDE_VERSION: "6.10.2"
      TARGET_ARCH: "aarch64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify deploy spec exists
        run: |
          test -f pysidedeploy.spec || { echo "Missing pysidedeploy.spec at repository root"; exit 1; }

      - name: Define dynamic paths
        run: |
          echo "VENV_PATH=$RUNNER_TEMP/android-venv" >> "$GITHUB_ENV"
          echo "WHEEL_DIR=$GITHUB_WORKSPACE/android-wheels" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            wget \
            curl \
            patchelf \
            python3-pip \
            python3-setuptools \
            python3-dev \
            build-essential \
            patch \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            autopoint \
            gettext \
            gawk

      - name: Create virtual environment
        run: |
          python -m venv "$VENV_PATH"
          source "$VENV_PATH/bin/activate"
          python -m pip install --upgrade pip
          pip install -r requirements-android.txt

          # Force the deploy tooling to match the Android wheels version exactly
          pip install --force-reinstall --no-cache-dir \
            "PySide6==${QT_PYSIDE_VERSION}" \
            "shiboken6==${QT_PYSIDE_VERSION}" \
            buildozer==1.5.0 \
            Cython==0.29.34 \
            setuptools \
            GitPython \
            tqdm \
            Jinja2

          python - <<'PY'
          import pathlib
          import PySide6

          print("PySide6 version:", PySide6.__version__)
          root = pathlib.Path(PySide6.__file__).resolve().parent
          jars = sorted(str(p) for p in root.rglob("*.jar"))

          print("Qt/Android jars visible from installed PySide6:")
          if jars:
              for j in jars:
                  print(" -", j)
          else:
              print(" - no jars found under installed PySide6 package")
          PY

      - name: Download Android prerequisites using Qt helper
        run: |
          set -Eeuo pipefail
          source "$VENV_PATH/bin/activate"

          rm -rf pyside-setup
          git clone --depth 1 --branch "${QT_PYSIDE_VERSION}" https://github.com/pyside/pyside-setup.git pyside-setup
          cd pyside-setup

          python tools/cross_compile_android/main.py \
            --download-only \
            --skip-update \
            --auto-accept-license

          cd ..

          if [ -d "$HOME/.pyside6_android_deploy" ]; then
            echo "QT_DEPLOY_CACHE=$HOME/.pyside6_android_deploy" >> "$GITHUB_ENV"
          elif [ -d "$HOME/.pyside6-android-deploy" ]; then
            echo "QT_DEPLOY_CACHE=$HOME/.pyside6-android-deploy" >> "$GITHUB_ENV"
          else
            echo "Qt helper did not create a detectable cache directory"
            ls -la "$HOME"
            exit 1
          fi

          # Do not let the helper checkout be picked up as app input
          rm -rf pyside-setup

      - name: Confirm Qt helper cache exists
        run: |
          test -n "$QT_DEPLOY_CACHE" || { echo "QT_DEPLOY_CACHE is empty"; exit 1; }
          test -d "$QT_DEPLOY_CACHE" || { echo "Qt helper cache directory does not exist"; exit 1; }
          find "$QT_DEPLOY_CACHE" -maxdepth 3 -type d | sort | sed -n '1,120p'

      - name: Detect Android NDK root inside Qt helper cache
        run: |
          set -Eeuo pipefail

          NDK_READOBJ="$(find "$QT_DEPLOY_CACHE" -type f -path '*/toolchains/llvm/prebuilt/*/bin/llvm-readobj' | head -n 1 || true)"

          if [ -z "$NDK_READOBJ" ]; then
            echo "Could not find llvm-readobj inside Qt helper cache"
            find "$QT_DEPLOY_CACHE" -maxdepth 5 -type d | sort | sed -n '1,200p'
            exit 1
          fi

          ANDROID_NDK_PATH="$(
            NDK_READOBJ="$NDK_READOBJ" python - <<'PY'
          from pathlib import Path
          import os
          p = Path(os.environ["NDK_READOBJ"])
          print(p.parents[5])
          PY
          )"

          echo "ANDROID_NDK_PATH=$ANDROID_NDK_PATH" >> "$GITHUB_ENV"

          test -d "$ANDROID_NDK_PATH" || { echo "Resolved NDK root does not exist"; exit 1; }
          test -f "$ANDROID_NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readobj" || {
            echo "Resolved NDK root is invalid"
            exit 1
          }

          echo "Resolved NDK root: $ANDROID_NDK_PATH"

      - name: Export Android SDK path from Qt helper cache
        run: |
          echo "ANDROID_SDK_ROOT=$QT_DEPLOY_CACHE/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$QT_DEPLOY_CACHE/android-sdk" >> "$GITHUB_ENV"

      - name: Download Android wheels
        run: |
          set -Eeuo pipefail
          mkdir -p "$WHEEL_DIR"

          PYSIDE_WHEEL="PySide6-${QT_PYSIDE_VERSION}-${QT_PYSIDE_VERSION}-cp311-cp311-android_${TARGET_ARCH}.whl"
          SHIBOKEN_WHEEL="shiboken6-${QT_PYSIDE_VERSION}-${QT_PYSIDE_VERSION}-cp311-cp311-android_${TARGET_ARCH}.whl"

          PYSIDE_OFFICIAL="https://download.qt.io/official_releases/QtForPython/pyside6/${PYSIDE_WHEEL}"
          SHIBOKEN_OFFICIAL="https://download.qt.io/official_releases/QtForPython/shiboken6/${SHIBOKEN_WHEEL}"

          PYSIDE_SNAPSHOT="https://download.qt.io/snapshots/ci/pyside/${QT_PYSIDE_VERSION}/latest/pyside6/${PYSIDE_WHEEL}"
          SHIBOKEN_SNAPSHOT="https://download.qt.io/snapshots/ci/pyside/${QT_PYSIDE_VERSION}/latest/pyside6/${SHIBOKEN_WHEEL}"

          if wget -q --spider "$PYSIDE_OFFICIAL"; then
            echo "Downloading official PySide6 Android wheel"
            wget -q -O "$WHEEL_DIR/$PYSIDE_WHEEL" "$PYSIDE_OFFICIAL"
          else
            echo "Official PySide6 Android wheel URL not reachable, falling back to snapshot"
            wget -q -O "$WHEEL_DIR/$PYSIDE_WHEEL" "$PYSIDE_SNAPSHOT"
          fi

          if wget -q --spider "$SHIBOKEN_OFFICIAL"; then
            echo "Downloading official shiboken6 Android wheel"
            wget -q -O "$WHEEL_DIR/$SHIBOKEN_WHEEL" "$SHIBOKEN_OFFICIAL"
          else
            echo "Official shiboken6 Android wheel URL not reachable, falling back to snapshot"
            wget -q -O "$WHEEL_DIR/$SHIBOKEN_WHEEL" "$SHIBOKEN_SNAPSHOT"
          fi

          ls -lh "$WHEEL_DIR"

      - name: Create root main.py wrapper for Android deploy
        run: |
          test -f src/main.py || { echo "Missing src/main.py"; exit 1; }
          cat > main.py <<'PY'
          import runpy

          if __name__ == "__main__":
              runpy.run_module("src.main", run_name="__main__")
          PY

      - name: Remove UTF-8 BOM from Python files
        run: |
          python - <<'PY'
          from pathlib import Path

          fixed = []
          for p in Path("src").rglob("*.py"):
              raw = p.read_bytes()
              if raw.startswith(b'\xef\xbb\xbf'):
                  p.write_bytes(raw[3:])
                  fixed.append(str(p))

          if fixed:
              print("Removed BOM from:")
              for f in fixed:
                  print(" -", f)
          else:
              print("No BOM found in Python files under src.")
          PY

      - name: Patch pysidedeploy.spec for CI
        run: |
          python - <<'PY'
          import configparser
          from pathlib import Path
          import os

          spec_path = Path("pysidedeploy.spec")
          cfg = configparser.ConfigParser()
          cfg.optionxform = str
          cfg.read(spec_path, encoding="utf-8")

          for section in ("app", "python", "android", "buildozer"):
              if section not in cfg:
                  cfg[section] = {}

          qt_ver = os.environ["QT_PYSIDE_VERSION"]
          arch = os.environ["TARGET_ARCH"]
          wheel_dir = os.environ["WHEEL_DIR"]
          venv_path = os.environ["VENV_PATH"]
          sdk_root = os.environ["ANDROID_SDK_ROOT"]
          ndk_root = os.environ["ANDROID_NDK_PATH"]

          cfg["app"]["input_file"] = "main.py"
          cfg["app"]["project_dir"] = "."
          cfg["app"]["project_file"] = ""

          cfg["python"]["python_path"] = f"{venv_path}/bin/python"
          cfg["python"]["android_packages"] = "buildozer==1.5.0,Cython==0.29.34,setuptools"

          cfg["android"]["wheel_pyside"] = f"{wheel_dir}/PySide6-{qt_ver}-{qt_ver}-cp311-cp311-android_{arch}.whl"
          cfg["android"]["wheel_shiboken"] = f"{wheel_dir}/shiboken6-{qt_ver}-{qt_ver}-cp311-cp311-android_{arch}.whl"

          cfg["buildozer"]["mode"] = "debug"
          cfg["buildozer"]["arch"] = arch
          cfg["buildozer"]["sdk_path"] = sdk_root
          cfg["buildozer"]["ndk_path"] = ndk_root

          with spec_path.open("w", encoding="utf-8") as f:
              cfg.write(f)

          print("Patched pysidedeploy.spec")
          PY

      - name: Build APK end-to-end with pyside6-android-deploy
        run: |
          set -Eeuo pipefail
          rm -rf .buildozer buildozer.spec src/deployment bin build ci-debug
          mkdir -p ci-debug
          source "$VENV_PATH/bin/activate"

          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export ANDROID_SDK_ROOT="$ANDROID_SDK_ROOT"
          export ANDROID_NDK="$ANDROID_NDK_PATH"
          export ANDROID_NDK_HOME="$ANDROID_NDK_PATH"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_PATH"
          export ANDROIDNDK="$ANDROID_NDK_PATH"
          export ANDROIDSDK="$ANDROID_SDK_ROOT"

          export PATH="$JAVA_HOME/bin:$ANDROID_SDK_ROOT/tools/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

          echo "QT_DEPLOY_CACHE=$QT_DEPLOY_CACHE" | tee ci-debug/build-apk.log
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" | tee -a ci-debug/build-apk.log
          echo "ANDROID_NDK_PATH=$ANDROID_NDK_PATH" | tee -a ci-debug/build-apk.log

          LIBFFI_CFG=".buildozer/android/platform/build-arm64-v8a/build/other_builds/libffi/arm64-v8a__ndk_target_21/libffi/config.log"

          (
            set +e
            while true; do
              if [ -f "$LIBFFI_CFG" ]; then
                cp -f "$LIBFFI_CFG" ci-debug/libffi-config.log 2>/dev/null || true
                tail -n 200 "$LIBFFI_CFG" > ci-debug/libffi-config.tail.txt 2>/dev/null || true
              fi
              sleep 1
            done
          ) &
          SNAP_PID=$!

          cleanup_snap() {
            kill "$SNAP_PID" 2>/dev/null || true
            wait "$SNAP_PID" 2>/dev/null || true
          }
          trap cleanup_snap EXIT

          rm -rf pyside-setup

          pyside6-android-deploy \
            --force \
            --keep-deployment-files \
            --verbose \
            --config-file pysidedeploy.spec \
            --sdk-path "$ANDROID_SDK_ROOT" \
            --ndk-path "$ANDROID_NDK_PATH" \
            --extra-ignore-dirs .git,.github,build,dist,venv,__pycache__,android-wheels,pyside-setup \
            2>&1 | tee -a ci-debug/build-apk.log

      - name: Inspect generated Qt Android artifacts
        if: always()
        run: |
          source "$VENV_PATH/bin/activate"

          echo "==== Installed PySide6 version ===="
          python - <<'PY'
          import pathlib
          import PySide6

          print("PySide6 version:", PySide6.__version__)
          root = pathlib.Path(PySide6.__file__).resolve().parent
          jars = sorted(root.rglob("*.jar"))
          if jars:
              for p in jars:
                  print(p)
          else:
              print("No *.jar files found under installed PySide6 package")
          PY

          echo "==== Generated deployment files ===="
          find src/deployment .buildozer -type f \( -name "*.jar" -o -name "buildozer.spec" -o -name "*.java" \) 2>/dev/null | sort | sed -n '1,300p'

          echo "==== References to QtActivity / QtActivityBase ===="
          grep -RIn "QtActivityBase\|QtActivity" src/deployment .buildozer 2>/dev/null | sed -n '1,300p'

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            ci-debug/**
            buildozer.spec
            src/deployment/**
          if-no-files-found: ignore

      - name: Upload Android package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dog-android-package
          path: |
            bin/*.apk
            bin/*.aab
            ./**/*.apk
            ./**/*.aab
          if-no-files-found: error