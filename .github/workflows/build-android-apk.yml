name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify PySide deploy spec exists
        run: |
          if [ ! -f pysidedeploy.spec ]; then
            echo "Missing pysidedeploy.spec at repository root."
            echo "Create it locally with: pyside6-android-deploy --init"
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            wget \
            patchelf \
            libffi-dev \
            libssl-dev

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-android.txt

      - name: Install Android SDK command-line tools
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

      - name: Install Android SDK/NDK packages
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH="$JAVA_HOME/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.2.12479018" \
            "cmake;3.22.1"

      - name: Build APK (PySide6 Android Deploy)
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH="$JAVA_HOME/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          
          # Create symlink for Android deployment
          ln -sf src/main.py main.py
          
          pyside6-android-deploy \
            --verbose \
            --wheel-pyside $(python -c "import site; print(site.getsitepackages()[0])")/PySide6 \
            --wheel-shiboken $(python -c "import site; print(site.getsitepackages()[0])")/shiboken6

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dog-android-apk
          path: |
            build/**/*.apk
            dist/**/*.apk
            **/*.apk
