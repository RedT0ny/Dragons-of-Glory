name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-windows.txt
          pip install pyinstaller

      - name: Set app version
        run: |
          python -c "from src.content.config import APP_VERSION; print(f'APP_VERSION={APP_VERSION}')" >> $env:GITHUB_ENV

      - name: Build EXE (PyInstaller)
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --name "dog_$env:APP_VERSION" `
            --icon assets/icon/DOG_icon.ico `
            --collect-binaries PySide6.QtMultimedia `
            --collect-binaries PySide6.QtMultimediaWidgets `
            --hidden-import PySide6.QtMultimedia `
            --hidden-import PySide6.QtMultimediaWidgets `
            --add-data "assets/audio;assets/audio" `
            --add-data "assets/doc;assets/doc" `
            --add-data "assets/font;assets/font" `
            --add-data "assets/icon;assets/icon" `
            --add-data "assets/img;assets/img" `
            --add-data "assets/video;assets/video" `
            --add-data "data;data" `
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dog-windows-exe
          path: dist/dog_${{ env.APP_VERSION }}.exe
